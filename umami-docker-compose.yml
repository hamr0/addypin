version: '3.8'
services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3001:3000"  # Use port 3001 to avoid conflict with your main app
    environment:
      DATABASE_URL: ${DATABASE_URL}  # Reuse your existing PostgreSQL database
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      HASH_SALT: ${UMAMI_HASH_SALT}
      TRACKER_SCRIPT_NAME: umami.js  # Custom script name for security
      API_COLLECT_ENDPOINT: /api/send  # Custom endpoint
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Note: We're using your existing PostgreSQL database
# No separate database container needed