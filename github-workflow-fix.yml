# Alternative Fix: Use ESM-Compatible Node.js Flags

## Issue Analysis:
- **Build uses modern ESM features** (import.meta, top-level await)
- **Cannot convert to CommonJS** without breaking the code
- **Need to run ESM bundle with dynamic require support**

## Solution: Update systemd service to use ESM-compatible flags

Run on VPS:
```bash
# Revert to original ESM build
cd /opt/addypin/addypin-repo
sed -i 's/--format=cjs/--format=esm/' package.json
npm run build
cp dist/index.js /opt/addypin/app/index.js

# Update systemd service to use ESM loader
sudo tee /etc/systemd/system/addypin.service > /dev/null << 'EOF'
[Unit]
Description=AddyPin Location Sharing Service
After=network.target postgresql.service

[Service]
Type=simple
User=addypin
WorkingDirectory=/opt/addypin/app
ExecStart=/usr/bin/node --experimental-loader @babel/register --es-module-specifier-resolution=node index.js
EnvironmentFile=/opt/addypin/app/.env
Restart=always
RestartSec=10

[Install]
WantedBy=multi-user.target
EOF

systemctl daemon-reload
systemctl restart addypin
```

This approach maintains ESM format but adds Node.js flags to handle dynamic imports.