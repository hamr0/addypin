version: '3.8'
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.static
    container_name: addypin-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: addypin-backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://addypin:${VPS_DATABASE_PASSWORD}@db:5432/addypin
      - RESEND_API_KEY=${RESEND_API_KEY}

  db:
    image: postgres:13
    container_name: addypin-db
    environment:
      POSTGRES_DB: addypin
      POSTGRES_USER: addypin
      POSTGRES_PASSWORD: ${VPS_DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
