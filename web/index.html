<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>addypin — drop a pin, get a link</title>
<meta name="description" content="Share a precise location with a short, memorable link.">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
    :root {
        --brand: #00BCD4; --brand-bright: #1ee0ff;
        --ink: #0b1426; --ink-2: #142036; --line: #243149; --muted: #8aa0c0;
        --error: #ff6b6b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow-x: hidden;
                 font-family: ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, monospace;
                 -webkit-font-smoothing: antialiased; color: white; }
    #map { position: absolute; inset: 0; z-index: 0; }
    .leaflet-tile-pane { filter: saturate(0.85); }

    .topbar { position: absolute; top: 14px; left: 14px; right: 14px; z-index: 1000;
              display: grid; grid-template-columns: auto auto 1fr; gap: 12px; align-items: center; }

    .locate { background: var(--ink); border: 1px solid var(--line); color: var(--brand-bright);
              width: 44px; height: 44px; padding: 0; font-size: 22px; line-height: 1;
              cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .locate:hover { background: var(--ink-2); }
    .locate:active { transform: scale(0.96); }
    .locate.busy { animation: pulse 1.2s ease-in-out infinite; }
    .locate[hidden] { display: none; }
    @keyframes pulse { 50% { color: white; } }

    .brand { background: var(--ink); color: white; padding: 8px 14px;
             border: 1px solid var(--line); display: flex; align-items: center; gap: 10px;
             text-decoration: none; }
    .brand:hover { border-color: var(--brand-bright); }
    .brand img { height: 26px; }
    .brand .word { font-weight: 800; letter-spacing: -0.02em; font-size: 16px; }
    .brand .accent { color: var(--brand-bright); }

    /* Leaflet's bottom-right zoom control sits clear of the bottom panel
       (collapsed ≈ 88 px with banner). When the drawer is open the panel
       grows but the zoom stays put — acceptable tradeoff vs. pinning it. */
    .leaflet-bottom.leaflet-right { bottom: 100px !important; }

    .search { position: relative; background: var(--ink); border: 1px solid var(--line);
              display: flex; align-items: center; padding: 0 12px; }
    .search::before { content: '⌕'; color: var(--brand-bright); font-size: 18px; margin-right: 10px; }
    .search input { flex: 1; background: none; border: 0; outline: 0; padding: 12px 0;
                    color: white; font: inherit; font-size: 14px; }
    .search input::placeholder { color: var(--muted); }
    .search .spinner { width: 14px; height: 14px; border: 2px solid var(--line);
                       border-top-color: var(--brand-bright); border-radius: 999px;
                       animation: spin .8s linear infinite; display: none; }
    .search.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results { position: absolute; top: calc(100% + 4px); left: 0; right: 0;
               background: var(--ink); border: 1px solid var(--line); max-height: 280px;
               overflow-y: auto; display: none; }
    .results.show { display: block; }
    .result { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--line); font-size: 13px; }
    .result:last-child { border-bottom: 0; }
    .result:hover, .result.hot { background: var(--ink-2); color: var(--brand-bright); }
    .result .sub { color: var(--muted); font-size: 11px; margin-top: 2px; }

    .bottom { position: absolute; left: 14px; right: 14px; bottom: 14px; z-index: 1000;
              background: var(--ink); border: 1px solid var(--line); padding: 14px; }

    /* Always-visible thin banner at the top of the bottom panel. Tagline
       on the left, manage link on the right. Visible in both collapsed and
       expanded states. Replaces the old floating tagline-strip. */
    .banner { display: flex; justify-content: space-between; align-items: center;
              gap: 12px; padding-bottom: 10px; margin-bottom: 10px;
              border-bottom: 1px solid var(--line);
              font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; }
    .banner .left { color: var(--muted); }
    .banner .left .pop { color: var(--brand-bright); margin: 0 2px; }
    .banner-actions { display: flex; align-items: center; gap: 6px; }
    .banner .right { background: var(--brand); color: var(--ink);
                     padding: 5px 10px; font: inherit; font-weight: 800;
                     font-size: inherit; letter-spacing: 0.1em;
                     text-decoration: none; white-space: nowrap; border: 0; cursor: pointer;
                     transition: background .15s, transform .05s; }
    .banner .right:hover { background: var(--brand-bright); }
    .banner .right:active { transform: translateY(1px); }
    .banner .right.secondary { background: var(--ink-2); color: var(--muted);
                               border: 1px solid var(--line); display: none; }
    .banner .right.secondary:hover { color: white; border-color: var(--brand-bright);
                                     background: var(--ink-2); }
    /* "drop another" only appears in the success state */
    .bottom.done .banner .right.secondary { display: inline-block; }

    .row1 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .row1 .tag { font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
                 color: var(--brand-bright); font-weight: 700; }
    .row1 .coords { font-size: 14px; color: white; font-weight: 700; }
    .row1 .coords.empty { color: var(--muted); font-weight: 400; }
    .row1 .accuracy { font-size: 11px; color: #ef4444; font-weight: 600;
                      letter-spacing: 0.04em; display: none; }
    .row1 .accuracy.show { display: inline; }

    .expand { max-height: 0; opacity: 0; overflow: hidden;
              transition: max-height .35s ease, opacity .25s ease, margin-top .25s ease; }
    .bottom.active .expand { max-height: 280px; opacity: 1; margin-top: 12px; }

    .row2 { display: grid; grid-template-columns: 1fr 1.5fr auto; gap: 10px; align-items: stretch; }
    input.field { background: var(--ink-2); border: 1px solid var(--line);
                  color: white; padding: 11px 12px; font: inherit; font-size: 14px;
                  outline: none; width: 100%; min-width: 0; }
    input.field::placeholder { color: var(--muted); }
    input.field:focus { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(0,188,212,.3); }
    input.field.error { border-color: var(--error); box-shadow: 0 0 0 2px rgba(255,107,107,.25); }
    button.go { background: var(--brand); color: var(--ink); border: 0; padding: 0 22px;
                font: inherit; font-weight: 800; font-size: 14px; cursor: pointer;
                text-transform: uppercase; letter-spacing: 0.08em;
                transition: background .15s, transform .05s; }
    button.go:hover:not(:disabled) { background: var(--brand-bright); }
    button.go:active:not(:disabled) { transform: translateY(1px); }
    button.go:disabled { background: var(--line); color: var(--muted); cursor: not-allowed; }
    .footnote { font-size: 11px; color: var(--muted); margin-top: 10px; text-align: center; }
    .footnote .dot { color: var(--brand-bright); margin: 0 6px; }
    .errmsg { color: var(--error); font-size: 12px; margin-top: 8px; min-height: 16px; }

    /* Success state — replaces .row2 + .footnote when pin is created */
    .success { display: none; }
    .bottom.done .expand .row2,
    .bottom.done .expand .footnote,
    .bottom.done .expand .errmsg { display: none; }
    .bottom.done .expand .success { display: block; }
    .success .links { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .success .link-card { display: flex; align-items: center; gap: 10px;
                          padding: 8px 12px; text-align: left;
                          background: var(--ink-2); border: 1px solid var(--line);
                          color: white; font: inherit; cursor: pointer;
                          transition: border-color .15s, background .15s; }
    .success .link-card:hover { border-color: var(--brand-bright); }
    .success .link-card:active { transform: translateY(1px); }
    .success .link-card.copied { border-color: var(--brand-bright); background: var(--ink); }
    .success .link-card .label { font-size: 10px; text-transform: uppercase;
                                 letter-spacing: 0.14em; color: var(--brand-bright);
                                 font-weight: 700; flex-shrink: 0; }
    .success .link-card .val { font-size: 12px; word-break: break-all;
                               flex: 1; min-width: 0; }
    .success .link-card.copied .val::after { content: '  ✓ copied';
                                             color: var(--brand-bright); font-size: 10px;
                                             letter-spacing: 0.12em; text-transform: uppercase;
                                             margin-left: 6px; white-space: nowrap; }
    .success .note { margin-top: 8px; font-size: 10px; color: var(--muted);
                     text-align: center; letter-spacing: 0.1em; text-transform: uppercase; }
    .success .note .pop { color: var(--brand-bright); margin: 0 3px; }

    @media (max-width: 720px) {
        .topbar { gap: 8px; top: 10px; left: 10px; right: 10px;
                  grid-template-columns: 1fr auto;
                  grid-template-areas: 'brand locate' 'search search'; }
        .brand  { grid-area: brand; padding: 8px 10px; }
        .locate { grid-area: locate; width: 40px; height: 40px; }
        .search { grid-area: search; }
        .brand .word { font-size: 14px; }
        .bottom { left: 10px; right: 10px; bottom: 10px; padding: 10px 12px;
                  max-height: calc(100vh - 130px); overflow-y: auto; }
        .banner { font-size: 9px; letter-spacing: 0.12em; padding-bottom: 6px; margin-bottom: 6px; gap: 8px; }
        .banner .right { padding: 4px 8px; font-size: 9px; letter-spacing: 0.06em; }
        .banner-actions { gap: 4px; }
        .row1 .tag { font-size: 10px; }
        .row1 .coords { font-size: 13px; }
        .row2 { grid-template-columns: 1fr 1fr;
                grid-template-areas: 'code email' 'go go'; gap: 8px; }
        .row2 #code  { grid-area: code; }
        .row2 #email { grid-area: email; }
        .row2 .go    { grid-area: go; padding: 11px; font-size: 14px; }
        /* iOS Safari zooms inputs with font-size < 16px on focus, creating
           horizontal scroll. 16px is the no-zoom threshold. */
        input.field, .search input { font-size: 16px; }
        .bottom.active .expand { max-height: 340px; margin-top: 10px; }
        .footnote { display: none; }
        /* Stack success cards on mobile — one per row — so vals stay readable. */
        .success .links { grid-template-columns: 1fr; gap: 6px; }
        .success .link-card { padding: 7px 10px; }
        .success .link-card .label { font-size: 9px; }
        .success .link-card .val { font-size: 12px; }
        .success .note { margin-top: 8px; font-size: 9px; }
        .leaflet-bottom.leaflet-right { bottom: 88px !important; }
    }
</style>
</head>
<body>
<div id="map"></div>

<div class="topbar">
    <a class="brand" href="/" title="new pin">
        <img src="/logo.png" alt="">
        <span class="word">addy<span class="accent">pin</span></span>
    </a>
    <button type="button" class="locate" id="locate" aria-label="use my location" title="Use my location">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="6"/>
            <circle cx="11" cy="11" r="1.5" fill="currentColor" stroke="none"/>
            <line x1="11" y1="1" x2="11" y2="4"/>
            <line x1="11" y1="18" x2="11" y2="21"/>
            <line x1="1" y1="11" x2="4" y2="11"/>
            <line x1="18" y1="11" x2="21" y2="11"/>
        </svg>
    </button>
    <div class="search" id="search">
        <input id="q" type="text" placeholder="Search address, place, or postcode..." autocomplete="off">
        <div class="spinner"></div>
        <div class="results" id="results"></div>
    </div>
</div>
<form class="bottom" id="bottom">
    <div class="banner">
        <span class="left">drop a pin <span class="pop">·</span> get a link</span>
        <div class="banner-actions">
            <button type="button" class="right secondary" id="newPin">drop another</button>
            <a class="right" href="/manage">manage my pins →</a>
        </div>
    </div>
    <div class="row1">
        <span class="tag">Pin</span>
        <span class="coords empty" id="coords">click the map or search above</span>
        <span class="accuracy" id="accuracy"></span>
    </div>
    <div class="expand">
        <div class="row2">
            <input class="field" id="code" placeholder="HOUSE1 (optional)" maxlength="6" pattern="[A-Za-z0-9]{6}" autocomplete="off">
            <input class="field" id="email" name="email" type="email" autocomplete="email" required placeholder="you@example.com">
            <button class="go" id="go" type="submit" disabled>Create</button>
        </div>
        <div class="errmsg" id="err"></div>
        <div class="footnote">no accounts <span class="dot">·</span> no tracking <span class="dot">·</span> open source</div>
        <div class="success" id="success">
            <div class="links">
                <button type="button" class="link-card" id="webCard">
                    <span class="label">Web</span>
                    <span class="val" id="webLink"></span>
                </button>
                <button type="button" class="link-card" id="emailCard">
                    <span class="label">Email</span>
                    <span class="val" id="emailLink"></span>
                </button>
            </div>
            <div class="note">tap to copy <span class="pop">·</span> magic link in inbox <span class="pop">·</span> 72h to confirm</div>
        </div>
    </div>
</form>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', { zoomControl: false }).setView([37.7749, -122.4194], 13);
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);

let pin = null, coords = null, accuracyCircle = null;

// One-mode accuracy signal: red halo + radius tip, drawn after a locate.
// Cleared by any refine action (click, search, locate again). Search and
// click never paint it — they're explicit user picks, not browser guesses.
const ACCURACY_COLOR = '#ef4444';

function clearAccuracy() {
    if (accuracyCircle) { map.removeLayer(accuracyCircle); accuracyCircle = null; }
    document.getElementById('accuracy').classList.remove('show');
}

function setCoords(latlng, opts = {}) {
    coords = latlng;
    if (pin) pin.setLatLng(latlng); else pin = L.marker(latlng).addTo(map);
    const c = document.getElementById('coords');
    c.classList.remove('empty');
    c.textContent = `${latlng.lat.toFixed(6)}, ${latlng.lng.toFixed(6)}`;
    document.getElementById('go').disabled = false;
    document.getElementById('bottom').classList.add('active');

    clearAccuracy();
    if (opts.accuracy != null) {
        accuracyCircle = L.circle(latlng, {
            radius: opts.accuracy,
            color: ACCURACY_COLOR, weight: 2, opacity: 0.7, dashArray: '6 4',
            fillColor: ACCURACY_COLOR, fillOpacity: 0.15,
            interactive: false,
        }).addTo(map);
        const label = document.getElementById('accuracy');
        const km = opts.accuracy >= 1000;
        label.textContent = `±${km ? Math.round(opts.accuracy / 1000) + ' km' : Math.round(opts.accuracy) + ' m'} · tap exact spot`;
        label.classList.add('show');
    }

    if (opts.fly) map.flyTo(latlng, Math.max(map.getZoom(), 15), { duration: 0.6 });
}
map.on('click', (e) => setCoords(e.latlng));

// ─── Bullseye: opt-in geolocation ──────────────────────────────────────
const locateBtn = document.getElementById('locate');
if (!('geolocation' in navigator)) {
    locateBtn.hidden = true;
} else {
    locateBtn.addEventListener('click', () => {
        locateBtn.classList.add('busy');
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                locateBtn.classList.remove('busy');
                setCoords(L.latLng(pos.coords.latitude, pos.coords.longitude),
                          { fly: true, accuracy: pos.coords.accuracy });
            },
            (err) => {
                locateBtn.classList.remove('busy');
                const msg = err.code === err.PERMISSION_DENIED
                    ? 'Location permission denied.'
                    : 'Could not get your location — tap the map instead.';
                const e = document.getElementById('err');
                e.textContent = msg;
                setTimeout(() => { if (e.textContent === msg) e.textContent = ''; }, 4000);
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
    });
}

// ─── Nominatim search ──────────────────────────────────────────────────
const q = document.getElementById('q');
const results = document.getElementById('results');
const search = document.getElementById('search');
let timer = null, abortCtl = null, hot = -1;

q.addEventListener('input', () => {
    const text = q.value.trim();
    if (timer) clearTimeout(timer);
    if (abortCtl) abortCtl.abort();
    if (text.length < 3) { results.classList.remove('show'); search.classList.remove('loading'); return; }
    timer = setTimeout(() => doSearch(text), 400);
});
async function doSearch(text) {
    search.classList.add('loading');
    abortCtl = new AbortController();
    try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(text)}`;
        const res = await fetch(url, { signal: abortCtl.signal,
            headers: { 'Accept-Language': navigator.language || 'en' } });
        const data = await res.json();
        renderResults(data);
    } catch (e) {
        if (e.name !== 'AbortError') console.error(e);
    } finally { search.classList.remove('loading'); }
}
function renderResults(items) {
    results.innerHTML = '';
    if (!items.length) { results.classList.remove('show'); return; }
    items.forEach((it) => {
        const el = document.createElement('div');
        el.className = 'result';
        const main = it.display_name.split(',')[0];
        const sub = it.display_name.split(',').slice(1, 4).join(',').trim();
        el.innerHTML = `<div>${escapeHtml(main)}</div><div class="sub">${escapeHtml(sub)}</div>`;
        el.addEventListener('click', () => choose(it));
        results.appendChild(el);
    });
    hot = -1;
    results.classList.add('show');
}
function choose(it) {
    setCoords(L.latLng(parseFloat(it.lat), parseFloat(it.lon)), { fly: true });
    q.value = it.display_name;
    results.classList.remove('show');
}
q.addEventListener('keydown', (e) => {
    const items = results.querySelectorAll('.result');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); hot = (hot + 1) % items.length; updateHot(items); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); hot = (hot - 1 + items.length) % items.length; updateHot(items); }
    else if (e.key === 'Enter' && hot >= 0) { e.preventDefault(); items[hot].click(); }
    else if (e.key === 'Escape') { results.classList.remove('show'); }
});
function updateHot(items) { items.forEach((el, i) => el.classList.toggle('hot', i === hot)); }
document.addEventListener('click', (e) => {
    if (!search.contains(e.target)) results.classList.remove('show');
});
function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ─── Submit to backend ─────────────────────────────────────────────────
const ERRORS = {
    invalid_coords: 'Coordinates look wrong. Click somewhere on the map.',
    invalid_email: 'That email doesn\'t look right.',
    invalid_shortcode: 'Codes are 6 letters or numbers — no symbols.',
    shortcode_taken: 'That code is already in use. Try another.',
    shortcode_reserved: 'That code is reserved. Try another.',
    rate_limited: 'Too many pins from this address. Try again in a bit.',
    shortcode_pool_unavailable: 'Server is briefly out of codes. Try again in a moment.',
    internal_error: 'Server error. Please try again.',
};

document.getElementById('bottom').addEventListener('submit', async (e) => {
    e.preventDefault();
    const err = document.getElementById('err');
    const go = document.getElementById('go');
    err.textContent = '';
    document.getElementById('code').classList.remove('error');
    document.getElementById('email').classList.remove('error');
    if (!coords) return;
    go.disabled = true; go.textContent = '...';
    try {
        const code = document.getElementById('code').value.toUpperCase() || undefined;
        const email = document.getElementById('email').value;
        const res = await fetch('/api/pins', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ lat: coords.lat, lng: coords.lng, shortcode: code, email }),
        });
        const data = await res.json();
        if (!res.ok) {
            err.textContent = ERRORS[data.error] || 'Something went wrong.';
            if (data.error === 'invalid_shortcode' || data.error === 'shortcode_taken' || data.error === 'shortcode_reserved') {
                document.getElementById('code').classList.add('error');
            } else if (data.error === 'invalid_email') {
                document.getElementById('email').classList.add('error');
            }
            return;
        }
        // Remember the email locally so /manage can show "Signed in as ..."
        // after the magic-link round-trip. Server stores no plaintext.
        try { localStorage.setItem('addypin:email', email.trim().toLowerCase()); } catch {}
        showSuccess(data.shortcode);
    } catch {
        err.textContent = 'Network error. Try again.';
    } finally {
        go.disabled = false; go.textContent = 'Create';
    }
});

function showSuccess(shortcode) {
    const host = location.host;
    document.getElementById('webLink').textContent = `${host}/${shortcode}`;
    document.getElementById('emailLink').textContent = `${shortcode}@${host.replace(/^www\./, '')}`;
    document.getElementById('bottom').classList.add('done');
}
// Whole-card tap-to-copy. No separate copy button.
for (const card of document.querySelectorAll('.link-card')) {
    card.addEventListener('click', async () => {
        const val = card.querySelector('.val').textContent;
        try { await navigator.clipboard.writeText(val); } catch { return; }
        card.classList.add('copied');
        setTimeout(() => card.classList.remove('copied'), 1600);
    });
}
document.getElementById('newPin').addEventListener('click', () => {
    document.getElementById('bottom').classList.remove('done');
    document.getElementById('code').value = '';
    document.getElementById('email').value = '';
    document.getElementById('err').textContent = '';
});
</script>
</body>
</html>
