name: 🚀 Deploy to Production (Hardcoded SSH)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Build application
      run: |
        cd frontend
        npm ci --legacy-peer-deps
        VITE_API_BASE_URL=https://addypin.com npm run build
        
    - name: Create deployment package
      run: |
        mkdir -p deploy/frontend deploy/backend
        cp -r frontend/dist/* deploy/frontend/
        cp -r backend/src deploy/backend/
        cp -r shared deploy/backend/
        cp frontend/package.json deploy/frontend/
        cp backend/package.json deploy/backend/
        cp backend/tsconfig.json deploy/backend/
        cp frontend/Dockerfile deploy/frontend/
        cp frontend/nginx.conf deploy/frontend/
        cp backend/Dockerfile deploy/backend/
        cp docker-compose.yml deploy/
        cp -r scripts deploy/
        tar -czf deployment.tar.gz deploy/
        
    - name: Setup SSH (Hardcoded Key)
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        
        # Hardcoded SSH private key (base64 encoded - working VPS key)
        echo "" | base64 -d > ~/.ssh/key
        chmod 600 ~/.ssh/key
        
        echo "✅ SSH key setup complete"
        ls -la ~/.ssh/
        
    - name: Deploy to VPS
      run: |
        echo "🚀 Deploying to VPS..."
        scp -i ~/.ssh/key -o StrictHostKeyChecking=no deployment.tar.gz root@155.94.144.191:/opt/addypin/
        ssh -i ~/.ssh/key -o StrictHostKeyChecking=no root@155.94.144.191 "
          set -e  # Exit on any error
          cd /opt/addypin
          
          echo '💾 Creating backup of current deployment...'
          if [ -d 'frontend' ] && [ -d 'backend' ]; then
            mkdir -p backup
            cp -r frontend backend docker-compose.yml backup/ 2>/dev/null || true
            tar -czf deployment-backup.tar.gz backup/
            echo '✅ Backup created: deployment-backup.tar.gz'
          else
            echo '⚠️ No existing deployment found to backup'
          fi
          
          echo '🛑 Stopping existing services...'
          docker-compose down || true
          
          echo '📦 Extracting deployment...'
          tar -xzf deployment.tar.gz
          cp -r deploy/* .
          
          echo '🧹 Cleaning up old Docker images...'
          chmod +x scripts/docker-cleanup.sh
          ./scripts/docker-cleanup.sh --deployment
          
          echo '🔨 Building containers...'
          docker-compose build --no-cache
          
          echo '🚀 Starting services...'
          docker-compose up -d
          
          echo '⏳ Waiting for services to start...'
          sleep 30
          
          echo '📊 Checking container status...'
          docker-compose ps
          
          echo '⏰ Setting up automated cleanup schedule...'
          chmod +x scripts/setup-cleanup-cron.sh
          ./scripts/setup-cleanup-cron.sh
          
          echo '✅ Deployment complete!'
        "
        
    - name: Health Check - API
      run: |
        echo "🏥 Testing API health..."
        for i in {1..5}; do
          if curl -f -s https://addypin.com/api/stats > /dev/null; then
            echo "✅ API is responding (attempt $i)"
            break
          else
            echo "⏳ API not ready, retrying in 10s... (attempt $i/5)"
            sleep 10
          fi
          if [ $i -eq 5 ]; then
            echo "❌ API health check failed after 5 attempts"
            exit 1
          fi
        done
        
    - name: Health Check - Frontend
      run: |
        echo "🌐 Testing frontend..."
        response=$(curl -s -o /dev/null -w "%{http_code}" https://addypin.com)
        if [ "$response" = "200" ]; then
          echo "✅ Frontend is accessible"
        else
          echo "❌ Frontend returned HTTP $response"
          exit 1
        fi
        
    - name: Send Deployment Notification
      if: always()
      run: |
        # Determine deployment status
        if [ "${{ job.status }}" = "success" ]; then
          STATUS="✅ SUCCESS"
          COLOR="good"
          MESSAGE="🎉 Deployment completed successfully!"
          DETAILS="Application: https://addypin.com\nAPI: https://addypin.com/api/stats\nStatus: All systems operational"
        else
          STATUS="❌ FAILED"
          COLOR="danger"
          MESSAGE="🚨 Deployment failed!"
          DETAILS="Please check GitHub Actions logs for details.\nConsider running emergency rollback if needed."
        fi
        
        # Create notification payload
        cat > notification.json << EOF
        {
          "deployment_status": "$STATUS",
          "message": "$MESSAGE",
          "details": "$DETAILS",
          "repository": "${{ github.repository }}",
          "actor": "${{ github.actor }}",
          "workflow": "${{ github.workflow }}",
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "commit": "${{ github.sha }}",
          "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        }
        EOF
        
        echo "📢 Notification payload created:"
        cat notification.json
        
        # Note: Webhook URL would be added here for actual notifications
        # Example: curl -X POST -H "Content-Type: application/json" -d @notification.json $WEBHOOK_URL
        
    - name: Deployment Status Report
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "✅ Application: https://addypin.com"
          echo "✅ API: https://addypin.com/api/stats" 
          echo "✅ Status: All systems operational"
          echo "💾 Backup: Created before deployment"
          echo "🔄 Rollback: Available if needed"
        else
          echo "🚨 DEPLOYMENT FAILED!"
          echo "❌ Please check the logs above for details"
          echo "🔄 Consider running emergency rollback"
          echo "🆘 Notification sent to monitoring systems"
        fi