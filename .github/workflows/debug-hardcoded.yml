name: Debug SSH - Hardcoded Values

on:
  workflow_dispatch:

jobs:
  debug_ssh_hardcoded:
    runs-on: ubuntu-latest
    
    steps:
    - name: Test Network Connectivity with Real Values
      run: |
        echo "=== Testing Network Connectivity ==="
        echo "GitHub Actions Runner IP:"
        curl -s ifconfig.me
        echo ""
        echo "Testing connection to 155.94.144.191:22"
        timeout 5 nc -zv -w 2 155.94.144.191 22 && echo "✅ Port 22 is reachable" || echo "❌ Port 22 is NOT reachable"
        
        echo "Testing DNS resolution:"
        nslookup 155.94.144.191
        
    - name: Setup SSH Key
      run: |
        echo "=== Setting up SSH Key ==="
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        # Use the SSH private key secret
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/private_key
        chmod 600 ~/.ssh/private_key
        echo "SSH key saved and permissions set"
        
    - name: Test SSH Connection with Real Values
      run: |
        echo "=== Testing SSH Connection ==="
        echo "Attempting SSH connection to root@155.94.144.191"
        ssh -vvv -o StrictHostKeyChecking=no -i ~/.ssh/private_key root@155.94.144.191 "whoami && echo 'SSH Connection Succeeded!'"