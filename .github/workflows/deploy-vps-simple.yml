name: 🎯 Simple VPS Deployment (Proven Working Method)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "" | base64 -d > ~/.ssh/key
        chmod 600 ~/.ssh/key
        echo "✅ SSH key setup complete"
        
    - name: Deploy to VPS
      run: |
        echo "🚀 Starting VPS deployment using proven method..."
        ssh -i ~/.ssh/key -o StrictHostKeyChecking=no root@155.94.144.191 '
          set -e
          cd /opt/addypin
          
          echo "📋 Pre-deployment status..."
          systemctl status addypin --no-pager || true
          
          echo "🧹 Docker cleanup (if applicable)..."
          if [ -f scripts/docker-cleanup.sh ]; then
            chmod +x scripts/docker-cleanup.sh
            ./scripts/docker-cleanup.sh --deployment || true
          fi
          
          echo "🚀 Running deployment..."
          
          # Remove any existing repo to start fresh
          rm -rf addypin-repo
          
          # Clone using SSH instead of HTTPS (no token needed)
          echo "Cloning repository via SSH..."
          git clone git@github.com:amrhas82/addypin.git addypin-repo || {
            echo "SSH clone failed, trying public clone..."
            git clone https://github.com/amrhas82/addypin.git addypin-repo
          }
          
          cd addypin-repo
          npm install
          echo "Building React client..."
          npx vite build
          echo "Building Node.js server..."
          npx esbuild server/index.ts --platform=node --bundle --format=esm --outdir=dist --external:pg-native --minify
          echo "Deploying files..."
          mkdir -p ../app
          rm -rf ../app/*
          cp -r dist/* ../app/
          cp package.json ../app/
          echo "Installing production dependencies..."
          cd ../app
          npm install --only=production pg
          chown -R addypin:addypin /opt/addypin/app
          echo "Starting AddyPin service..."
          systemctl start addypin
          sleep 3
          curl -f http://localhost:3000/api/health && echo "✅ Deployment complete!" || echo "⚠️ Check logs: journalctl -u addypin -n 20"
        '
        
    - name: Health Check
      run: |
        echo "🏥 Testing deployed application..."
        sleep 10
        
        for i in {1..5}; do
          if curl -f -s https://addypin.com/api/stats > /dev/null; then
            echo "✅ API is responding (attempt $i)"
            break
          else
            echo "⏳ API not ready, retrying in 10s... (attempt $i/5)"
            sleep 10
          fi
          if [ $i -eq 5 ]; then
            echo "❌ API health check failed after 5 attempts"
            exit 1
          fi
        done
        
        response=$(curl -s -o /dev/null -w "%{http_code}" https://addypin.com)
        if [ "$response" = "200" ]; then
          echo "✅ Frontend is accessible"
        else
          echo "❌ Frontend returned HTTP $response"
          exit 1
        fi
        
    - name: Deployment Summary
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "🎯 VPS DEPLOYMENT SUCCESSFUL!"
          echo "✅ Used proven working deployment method"
          echo "✅ Built locally on VPS (reliable approach)"
          echo "✅ Simple backup/restore process"
          echo "✅ systemd service management"
          echo "🌐 Website: https://addypin.com"
          echo "🔧 Method: Simple VPS script (no complex building)"
        else
          echo "🚨 VPS DEPLOYMENT FAILED!"
          echo "❌ Check VPS logs: ssh root@155.94.144.191 'journalctl -u addypin -n 20'"
          echo "🔄 Rollback available: Use proven backup restore process"
        fi