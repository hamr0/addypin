name: Deploy to Production - CLEAN

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install and build
      run: |
        npm ci --legacy-peer-deps
        cd client
        VITE_API_BASE_URL=https://addypin.com npm run build
        ls -la ../dist/
    
    - name: Create deployment bundle
      run: |
        mkdir -p deployment-bundle/frontend deployment-bundle/backend
        cp -r dist/* deployment-bundle/frontend/
        cp -r server deployment-bundle/backend/
        cp -r shared deployment-bundle/backend/
        cp package*.json deployment-bundle/backend/
        cp tsconfig*.json deployment-bundle/backend/
        cp frontend/Dockerfile deployment-bundle/frontend/
        cp frontend/nginx.conf deployment-bundle/frontend/
        cp backend/Dockerfile deployment-bundle/backend/
        cp docker-compose.yml deployment-bundle/
        tar -czf addypin-deployment.tar.gz deployment-bundle/
    
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/key
        chmod 600 ~/.ssh/key

    - name: Deploy to VPS
      run: |
        echo "🚀 Starting deployment..."
        scp -i ~/.ssh/key -o StrictHostKeyChecking=no addypin-deployment.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/opt/addypin/
        ssh -i ~/.ssh/key -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "
          cd /opt/addypin
          docker-compose down || echo 'No containers to stop'
          tar -xzf addypin-deployment.tar.gz
          cp -r deployment-bundle/* .
          docker-compose build --no-cache
          docker-compose up -d
          echo '✅ Deployment completed!'
        "