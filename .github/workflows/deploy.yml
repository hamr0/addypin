name: Deploy AddyPin to VPS

on:
  push:
    branches: [main, replit-containerized]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build React application
      run: |
        cd client
        npm run build
        echo "=== Real React Bundle Built ==="
        ls -lh ../dist/public/assets/
        
    - name: Prepare deployment files
      run: |
        mkdir -p deploy/frontend/dist/assets
        cp dist/public/index.html deploy/frontend/dist/
        cp dist/public/assets/* deploy/frontend/dist/assets/
        ls -lh deploy/frontend/dist/assets/

    - name: Transfer built files to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "deploy/frontend/dist/*"
        target: "/opt/addypin/frontend/dist/"
        strip_components: 3
        
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /opt/addypin
          echo "=== Real React bundle files ==="
          ls -lh frontend/dist/assets/
          docker-compose stop frontend
          docker-compose up -d --build frontend
          sleep 15
          curl -f https://addypin.com
