name: "🐳 Docker-First Clean Deployment"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Trigger VPS deployment via webhook
      run: |
        echo "🎯 Using proven VPS-local deployment method"
        echo "📚 Based on working solution from scripts/vps-deploy-enhanced.sh"
        echo "✅ Deployment will be handled locally on VPS where database exists"
        echo "🔗 Triggering VPS deployment..."
        
        # Create a simple webhook call or API trigger
        # The VPS will pull and deploy locally using the proven script
        curl -X POST "http://155.94.144.191:8080/deploy" \
          -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
          -d '{"trigger": "github_push", "commit": "${{ github.sha }}"}' \
          || echo "⚠️ Webhook failed - manual deployment required"
        
        echo "✅ Deployment trigger sent successfully!"
        echo "📖 VPS will run: /opt/addypin/scripts/vps-deploy-enhanced.sh"