name: "🐳 Docker-First Clean Deployment"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy via VPS webhook
      run: |
        echo "🎯 Triggering VPS Docker deployment..."
        
        # Create deployment payload
        PAYLOAD=$(cat << EOF
        {
          "token": "${{ secrets.PERSONAL_ACCESS_TOKEN }}",
          "commit": "${{ github.sha }}",
          "branch": "main",
          "trigger": "github_push"
        }
        EOF
        )
        
        # Trigger VPS deployment via simple HTTP call
        curl -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
          -d "$PAYLOAD" \
          "http://155.94.144.191:9000/deploy" \
          --connect-timeout 10 \
          --max-time 30 \
          || echo "⚠️ Direct webhook failed - using fallback method"
        
        # Fallback: Simple trigger file method
        echo "📝 Creating deployment trigger..."
        echo "${{ github.sha }}" > deploy-trigger.txt
        
        # Upload trigger via GitHub API (VPS polls this)
        curl -X PUT \
          -H "Authorization: token ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"message":"Trigger deployment","content":"'"$(base64 -w 0 deploy-trigger.txt)"'"}' \
          "https://api.github.com/repos/amrhas82/addypin/contents/trigger-deploy.txt" \
          || echo "⚠️ Trigger upload failed"
        
        echo "✅ Deployment initiated - VPS will pull and deploy with Docker"
        echo "📖 VPS runs: cd /opt/addypin/addypin-repo && git pull && docker build & run"