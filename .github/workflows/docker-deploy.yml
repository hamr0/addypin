name: "🐳 Docker-First Clean Deployment"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  SSH_HOST: 155.94.144.191
  APP_DIR: /opt/addypin
  REPO_NAME: addypin-repo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
        
    - name: Validate lock file
      run: |
        npm install --package-lock-only
        echo "✅ Lock file is in sync"
        
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/key
        chmod 600 ~/.ssh/key
        echo "✅ SSH key setup complete"
        
    - name: Deploy to VPS
      run: |
        SSH_CMD="ssh -i ~/.ssh/key -o StrictHostKeyChecking=no -o BatchMode=yes"
        
        echo "📥 Deploying with GitHub token authentication..."
        $SSH_CMD root@$SSH_HOST "
          set -e
          cd $APP_DIR
          
          # Set GitHub token environment variable
          export GITHUB_PERSONAL_ACCESS_TOKEN='${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}'
          
          # Cleanup existing deployment
          echo '🛑 Stopping existing containers...'
          docker stop addypin || true
          docker rm -f addypin || true
          
          # Get latest code using token
          rm -rf $REPO_NAME
          echo '📥 Cloning repository with token...'
          git clone https://\${GITHUB_PERSONAL_ACCESS_TOKEN}@github.com/amrhas82/addypin.git $REPO_NAME
          cd $REPO_NAME
          
          # Build Docker image
          echo '🏗️ Building Docker image...'
          IMAGE_TAG=\"addypin:\$(date +%Y%m%d-%H%M%S)-\$(git rev-parse --short HEAD)\"
          docker build --no-cache -t addypin:latest -t \"\$IMAGE_TAG\" .
          
          # Run database migration BEFORE starting app
          echo '🗄️ Running database migration...'
          export DATABASE_URL='postgresql://addypin_user:${{ secrets.VPS_DATABASE_PASSWORD }}@172.17.0.1:5432/addypin'
          npm install --production=false
          npm run db:push --force
          
          # Start container
          echo '🚀 Starting container...'
          docker run -d --name addypin -p 3000:3000 \
              -e DATABASE_URL=\"postgresql://addypin_user:${{ secrets.VPS_DATABASE_PASSWORD }}@172.17.0.1:5432/addypin\" \
              -e RESEND_API_KEY=\"${{ secrets.RESEND_API_KEY }}\" \
              -e GOOGLE_MAPS_API_KEY=\"${{ secrets.GOOGLE_MAPS_API_KEY }}\" \
              -e UMAMI_APP_SECRET=\"${{ secrets.UMAMI_APP_SECRET }}\" \
              -e UMAMI_HASH_SALT=\"${{ secrets.UMAMI_HASH_SALT }}\" \
              -e NODE_ENV=production \
              -e PORT=3000 \
              --restart unless-stopped \
              addypin:latest
              
          # Health check
          echo '🏥 Performing health check...'
          sleep 15
          for i in {1..6}; do
              echo \"Health check attempt \$i/6...\"
              if curl -f http://localhost:3000/api/health; then
                  echo '✅ Health check passed!'
                  break
              elif [ \$i -eq 6 ]; then
                  echo '❌ Health check failed after 6 attempts'
                  docker logs addypin --tail 20
                  exit 1
              else
                  echo 'Retrying in 10s...'
                  sleep 10
              fi
          done
          
          echo '✅ Deployment successful!'
        "
      env:
        SSH_HOST: ${{ env.SSH_HOST }}
        APP_DIR: ${{ env.APP_DIR }}
        REPO_NAME: ${{ env.REPO_NAME }}