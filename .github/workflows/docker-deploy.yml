name: "🚀 SSH Docker Deployment"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 155.94.144.191 >> ~/.ssh/known_hosts
        
    - name: Deploy to VPS
      run: |
        echo "🚀 Starting deployment to VPS..."
        
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@155.94.144.191 << 'EOF'
          set -e
          echo "📍 Connected to VPS successfully"
          
          cd /opt/addypin/addypin-repo
          echo "🔄 Pulling latest code..."
          git pull origin main
          
          echo "🛑 Stopping existing container..."
          docker stop addypin || true
          docker rm -f addypin || true
          
          echo "🔨 Building Docker image..."
          docker build -t addypin:latest .
          
          echo "🚀 Starting new container..."
          docker run -d --name addypin -p 3000:3000 \
            -e DATABASE_URL="postgresql://addypin_user:secure_password_123@172.17.0.1:5432/addypin" \
            -e NODE_ENV=production \
            --restart unless-stopped \
            addypin:latest
          
          echo "🏥 Health check..."
          sleep 5
          if curl -f http://localhost:3000/health; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Health check failed"
            docker logs addypin
            exit 1
          fi
        EOF
        
        echo "✅ CI/CD deployment completed successfully!"