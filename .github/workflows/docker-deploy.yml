name: "🚀 SSH Docker Deployment - RAW KEY FIX"

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 155.94.144.191 >> ~/.ssh/known_hosts
        
    - name: Deploy to VPS
      run: |
        echo "🚀 Starting deployment to VPS..."
        
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@155.94.144.191 << 'EOF'
          set -e
          echo "📍 Connected to VPS successfully"
          
          cd /opt/addypin/addypin-repo
          echo "🔄 Pulling latest code..."
          git pull origin main
          
          echo "🛑 Stopping existing container..."
          docker stop addypin || true
          docker rm -f addypin || true
          
          echo "🔨 Building Docker image..."
          docker build -t addypin:latest .
          
          echo "🚀 Starting new container..."
          docker run -d --name addypin -p 3000:3000 \
            -e DATABASE_URL="postgresql://addypin_user:secure_password_123@172.17.0.1:5432/addypin" \
            -e NODE_ENV=production \
            --restart unless-stopped \
            addypin:latest
          
          echo "⏱️ Waiting for container to start..."
          sleep 10
          
          echo "🏥 Health check..."
          # Use the correct health endpoint
          if curl -f http://localhost:3000/api/health; then
            echo "✅ Health check passed!"
          else
            echo "⚠️ Health check failed - checking basic connectivity..."
            if curl -f http://localhost:3000/; then
              echo "⚠️ App responds but health endpoint failing - likely database issue"
              echo "📊 Container status:"
              docker ps | grep addypin
              echo "📋 Container logs:"
              docker logs --tail 20 addypin
              echo "🔍 Continuing deployment - app is running"
            else
              echo "❌ Complete deployment failure"
              docker logs addypin
              exit 1
            fi
          fi
          
          echo "🎯 Final verification..."
          curl -s http://localhost:3000/ | head -c 100 || echo "Main page check failed"
          
        EOF
        
        echo "✅ CI/CD deployment completed!"