name: 🔍 Investigate Secret Integrity

on:
  workflow_dispatch:

jobs:
  investigate-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Secret Checksum and Format
        run: |
          # Write the secret to a file
          echo "${{ secrets.VPS_SSH_KEY }}" > ./github_secret_key
          
          # Generate checksum for the secret
          echo "=== GitHub Secret Analysis ==="
          echo "GitHub Secret SHA256 Checksum:"
          sha256sum ./github_secret_key
          
          echo "GitHub Secret file size (bytes):"
          wc -c ./github_secret_key
          
          echo "GitHub Secret line count:"
          wc -l ./github_secret_key
          
          echo "--- First 3 lines of GitHub secret ---"
          head -n 3 ./github_secret_key
          echo "--- Last 3 lines of GitHub secret ---"
          tail -n 3 ./github_secret_key
          
          # Test if it's a valid private key format
          echo "=== Key Format Validation ==="
          if [[ $(head -n 1 ./github_secret_key) == "-----BEGIN OPENSSH PRIVATE KEY-----" ]]; then
            echo "✅ Valid OpenSSH private key header"
          else
            echo "❌ Invalid private key header"
          fi
          
          if [[ $(tail -n 1 ./github_secret_key) == "-----END OPENSSH PRIVATE KEY-----" ]]; then
            echo "✅ Valid OpenSSH private key footer"
          else
            echo "❌ Invalid private key footer"
          fi

      - name: Test Network Connectivity
        run: |
          echo "=== Network Connectivity Test ==="
          echo "Testing connection to ${{ secrets.SSH_HOST }}:22"
          timeout 5 nc -zv -w 2 ${{ secrets.SSH_HOST }} 22 && echo "✅ Port 22 is reachable" || echo "❌ Port 22 is NOT reachable"
          
          echo "GitHub Actions Runner IP:"
          curl -s ifconfig.me
          echo ""