name: Deploy Database Schema to Production

on:
  workflow_dispatch: # Manual trigger
  push:
    paths:
      - 'shared/schema.ts'
    branches:
      - main

jobs:
  deploy-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Database Schema via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/addypin
            # Pull latest changes
            git pull origin main
            
            # Run the database deployment script
            ./scripts/deploy-database-schema.sh
            
            # Restart the container to pick up schema changes
            docker restart addypin
            
            # Verify deployment
            sleep 5
            curl -f http://localhost:3000/api/health || exit 1
            
            echo "✅ Database schema deployed successfully!"