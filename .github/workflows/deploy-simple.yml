name: Deploy AddyPin to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ closed ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when PR is merged to main or direct push to main
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies and build
      run: |
        sudo apt-get update && sudo apt-get install -y sshpass
        npm ci --legacy-peer-deps
        cd client
        VITE_API_BASE_URL=https://addypin.com npm run build
        ls -la ../dist/
    
    - name: Create deployment bundle
      run: |
        mkdir -p deployment-bundle/frontend
        mkdir -p deployment-bundle/backend
        
        # Copy frontend build
        cp -r dist/* deployment-bundle/frontend/
        
        # Copy backend source with fixed db.ts
        cp -r server deployment-bundle/backend/
        cp -r shared deployment-bundle/backend/
        cp package*.json deployment-bundle/backend/
        cp tsconfig*.json deployment-bundle/backend/
        
        # Copy Docker configurations
        cp frontend/Dockerfile deployment-bundle/frontend/
        cp frontend/nginx.conf deployment-bundle/frontend/
        cp backend/Dockerfile deployment-bundle/backend/
        cp docker-compose.yml deployment-bundle/
        
        tar -czf addypin-deployment.tar.gz deployment-bundle/
    
    - name: Deploy to VPS
      run: |
        echo "🚀 Starting deployment to VPS..."
        
        # Transfer deployment bundle
        echo "📦 Transferring deployment bundle..."
        sshpass -p "${{ secrets.SSH_PASSWORD }}" scp -o StrictHostKeyChecking=no addypin-deployment.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/opt/addypin/ || {
          echo "❌ Failed to transfer deployment bundle"
          exit 1
        }
        
        # Deploy and restart services with error handling
        echo "🔄 Deploying on VPS..."
        sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "
          set -e
          echo '🏠 Current directory: \$(pwd)'
          cd /opt/addypin || { echo '❌ Failed to cd /opt/addypin'; exit 1; }
          
          echo '🛑 Stopping existing containers...'
          docker-compose down || echo 'No containers to stop'
          
          echo '📂 Extracting deployment bundle...'
          tar -xzf addypin-deployment.tar.gz || { echo '❌ Failed to extract bundle'; exit 1; }
          
          echo '📋 Copying files...'
          cp -r deployment-bundle/* . || { echo '❌ Failed to copy files'; exit 1; }
          
          echo '🔨 Building containers (this may take several minutes)...'
          docker-compose build --no-cache || { echo '❌ Docker build failed'; exit 1; }
          
          echo '🚀 Starting services...'
          docker-compose up -d || { echo '❌ Failed to start containers'; exit 1; }
          
          echo '⏳ Waiting for services to stabilize...'
          sleep 20
          
          echo '🔍 Checking deployment status...'
          docker-compose ps
          
          echo '🌐 Testing website...'
          curl -I https://addypin.com && echo '✅ Website accessible' || echo '⚠️ Website check failed'
          
          echo '🎉 Deployment process completed!'
        " || {
          echo "❌ VPS deployment failed"
          exit 1
        }