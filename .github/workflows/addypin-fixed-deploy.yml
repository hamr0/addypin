name: "AddyPin VPS Fixed Deploy"

on:
  workflow_dispatch:
    inputs:
      deployment_reason:
        description: 'Reason for deployment'
        required: false
        default: 'Manual production deployment with proven approach'

permissions:
  contents: read

concurrency:
  group: addypin-production-deployment
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
    - name: "📦 Checkout Repository"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: "🏗️ Setup Node.js"
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: "🔐 Validate Required Environment Variables"
      run: |
        echo "🔍 Validating required environment variables..."
        
        missing_vars=()
        
        if [ -z "${{ secrets.VPS_HOST }}" ]; then
          missing_vars+=("VPS_HOST")
        fi
        if [ -z "${{ secrets.VPS_USER }}" ]; then
          missing_vars+=("VPS_USER")
        fi
        if [ -z "${{ secrets.VPS_SSH_PRIVATE_KEY }}" ]; then
          missing_vars+=("VPS_SSH_PRIVATE_KEY")
        fi
        if [ -z "${{ secrets.DATABASE_URL }}" ]; then
          missing_vars+=("DATABASE_URL")
        fi
        if [ -z "${{ secrets.RESEND_API_KEY }}" ]; then
          missing_vars+=("RESEND_API_KEY")
        fi
        
        if [ ${#missing_vars[@]} -ne 0 ]; then
          echo "❌ Missing required environment variables:"
          printf '%s\n' "${missing_vars[@]}"
          exit 1
        fi
        
        echo "✅ All required environment variables are present"

    - name: "🔑 Setup SSH Access"
      run: |
        echo "🔑 Setting up SSH access to VPS..."
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
        echo "✅ SSH access configured"

    - name: "📋 Pre-deployment Health Check"
      run: |
        echo "📋 Running pre-deployment health checks..."
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
          echo "Checking system resources..."
          df -h
          free -h
          echo "Checking Docker status..."
          docker --version
          echo "✅ Pre-deployment health check completed"
        '

    - name: "🚀 Deploy Code to VPS"
      run: |
        echo "🚀 Starting file transfer deployment..."
        
        # Transfer files from GitHub Actions to VPS
        echo "📂 Transferring code files..."
        rsync -az --delete \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.env*' \
          -e "ssh -i ~/.ssh/id_ed25519" \
          ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/addypin-transfer/
        
        # Move files to final location
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
          sudo rm -rf /opt/addypin
          sudo mkdir -p /opt/addypin
          sudo mv /tmp/addypin-transfer/* /opt/addypin/
          sudo rm -rf /tmp/addypin-transfer
          echo "✅ File transfer deployment completed"
        '

    - name: "⚙️ Install Dependencies and Build"
      run: |
        echo "⚙️ Installing dependencies and building..."
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
          cd /opt/addypin
          
          echo "Installing Node.js dependencies..."
          sudo npm ci --omit=dev
          
          echo "Building application..."
          sudo npm run build
          
          echo "✅ Dependencies installed and build completed"
        '

    - name: "🐳 Build Docker Image"
      run: |
        echo "🐳 Building Docker image..."
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
          cd /opt/addypin
          
          echo "Building addypin Docker image..."
          sudo docker build -t addypin:latest .
          
          echo "✅ Docker image built successfully"
        '

    - name: "🛑 Stop Existing Container"
      run: |
        echo "🛑 Stopping existing addypin container..."
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
          sudo docker stop addypin 2>/dev/null || echo "No existing container to stop"
          sudo docker rm addypin 2>/dev/null || echo "No existing container to remove"
          echo "✅ Cleanup completed"
        '

    - name: "🚀 Start Production Container"
      run: |
        echo "🚀 Starting production container..."
        ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
          # Proven approach from working Personal Data OS CI/CD
          echo "🚀 Starting addypin container..."
          sudo docker run -d --name addypin \
            -p 3000:3000 \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            -e NODE_ENV=production \
            --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" \
            --health-interval=30s \
            --health-timeout=10s \
            --health-retries=3 \
            addypin:latest
          
          echo "⏱️ Waiting for services to be ready..."
          sleep 15
          
          echo "📋 Checking container status..."
          sudo docker ps --filter "name=addypin" --format "table {{.Names}}\t{{.Status}}\t{{.ID}}"
          
          # Get container ID using simple, reliable method
          CONTAINER_ID=$(sudo docker ps -q --filter "name=addypin" | head -1)
          
          if [ ! -z "$CONTAINER_ID" ]; then
            echo "✅ Container running: $CONTAINER_ID"
            
            # Step 2: Direct Functional Testing (proven approach)
            echo "📋 Testing Application Accessibility..."
            
            # Simple, reliable health check using curl
            echo "🧪 Testing backend accessibility..."
            curl -f http://localhost:3000/api/health -m 10 || {
              echo "❌ Health endpoint failed"
              exit 1
            }
            echo "✅ Health endpoint accessible"
            
            # Test stats endpoint
            echo "🧪 Testing stats endpoint..."
            curl -f http://localhost:3000/api/stats -m 10 || {
              echo "❌ Stats endpoint failed"
              exit 1
            }
            echo "✅ Stats endpoint accessible"
            
            # Test map links endpoint  
            echo "🧪 Testing map links endpoint..."
            curl -f http://localhost:3000/api/map-links/52.2748/4.7611 -m 10 || {
              echo "❌ Map links endpoint failed"
              exit 1
            }
            echo "✅ Map links endpoint accessible"
            
            echo "🎉 DEPLOYMENT SUCCESSFUL!"
            echo "✅ AddyPin is running at http://${{ secrets.VPS_HOST }}:3000"
            
          else
            echo "❌ No container found after deployment"
            exit 1
          fi
        '

    - name: "📊 Deployment Summary"
      run: |
        echo "📊 DEPLOYMENT SUMMARY"
        echo "===================="
        echo "✅ Code deployed successfully"
        echo "✅ Container started with proven approach"
        echo "✅ Health checks passed"
        echo "✅ AddyPin is live at http://${{ secrets.VPS_HOST }}:3000"
        echo ""
        echo "🔧 Fixes Applied:"
        echo "- Used proven Personal Data OS container approach"
        echo "- Simple 15-second wait instead of complex health parsing"
        echo "- Direct curl -f testing for reliability"
        echo "- Map links now open in same window"