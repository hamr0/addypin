server {
    listen 80;
    server_name addypin.com www.addypin.com;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly
    location / {
        # First, try to serve the request as a file (e.g., /assets/index.js)
        # If it's not found, serve the index.html file and let React Router handle it
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend
    location /api {
        proxy_pass http://backend:5000; # Uses Docker's internal networking
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}